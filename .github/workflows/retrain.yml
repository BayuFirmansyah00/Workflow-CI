name: CI Retrain and Push Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  retrain-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install MLflow & Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLflow Project (Retrain)
        run: |
          mlflow run MLProject --no-conda

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          # Mencari Run ID terbaru dari hasil retraining
          RUN_ID=$(ls -t mlruns/0/ | grep -v meta.yaml | head -n 1)
          MODEL_URI="runs:/$RUN_ID/model"
          
          echo "Membangun Docker Image untuk Run ID: $RUN_ID"
          mlflow models build-docker -m $MODEL_URI -n ${{ secrets.DOCKER_USERNAME }}/dropout_model:latest
          
          echo "Mendorong Docker Image ke Docker Hub..."
          docker push ${{ secrets.DOCKER_USERNAME }}/dropout_model:latest